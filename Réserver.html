<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Réservation — Hôtels Luxe Maroc</title>

  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body class="bg-cream">

  <nav class="navbar navbar-expand-lg navbar-light bg-cream shadow-sm fixed-top">
    <div class="container">
      <a class="navbar-brand" href="index.html">Hôtels Luxe Maroc</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNav4"><span class="navbar-toggler-icon"></span></button>
    </div>
  </nav>

  <main class="pt-5 mt-5">
    <div class="container py-5">
      <div class="row g-4">
        <div class="col-lg-7">
          <h2 class="heading-serif">Formulaire de réservation</h2>
          <form id="finalBookingForm" class="mt-3 bg-white p-4 rounded shadow-sm">
            <div class="mb-3">
              <label class="form-label">Nom complet</label>
              <input type="text" id="custName" class="form-control" required>
            </div>

            <div class="row g-3">
              <div class="col-md-6">
                <label class="form-label">Email</label>
                <input type="email" id="custEmail" class="form-control" required>
              </div>
              <div class="col-md-6">
                <label class="form-label">Téléphone</label>
                <input type="tel" id="custPhone" class="form-control" required>
              </div>
            </div>

            <div class="row g-3 mt-2">
              <div class="col-md-6">
                <label class="form-label">Arrivée</label>
                <input type="date" id="finalCheckin" class="form-control" required>
              </div>
              <div class="col-md-6">
                <label class="form-label">Départ</label>
                <input type="date" id="finalCheckout" class="form-control" required>
              </div>
            </div>

            <div class="row g-3 mt-2">
              <div class="col-md-4">
                <label class="form-label">Chambres</label>
                <select id="finalRooms" class="form-select">
                  <option>1</option><option>2</option><option>3</option>
                </select>
              </div>
              <div class="col-md-4">
                <label class="form-label">Personnes</label>
                <select id="finalGuests" class="form-select">
                  <option>1</option><option>2</option><option>3</option><option>4</option>
                </select>
              </div>
              <div class="col-md-4">
                <label class="form-label">Hôtel</label>
                <select id="finalHotel" class="form-select">
                  <option value="1">Riad Royal Marrakech — 2500 dh</option>
                  <option value="2">Hôtel Marina Casablanca — 1800 dh</option>
                  <option value="3">Resort Plage Agadir — 2200 dh</option>
                  <!-- include all hotels if desired -->
                </select>
              </div>
            </div>

            <div class="mt-3 d-flex justify-content-between align-items-center">
              <div class="small text-muted">Résumé</div>
              <div class="fw-bold" id="finalTotal">0 dh</div>
            </div>

            <div class="mt-3 d-grid">
              <button type="submit" class="btn btn-terra btn-lg">Confirmer la réservation</button>
            </div>
          </form>
        </div>

        <aside class="col-lg-5">
          <div class="card shadow-sm">
            <div class="card-body">
              <h5 class="card-title heading-serif">Récapitulatif</h5>
              <div id="summaryCard" class="text-muted small mt-3">
                <p id="summaryHotel">Hôtel: —</p>
                <p id="summaryDates">Dates: —</p>
                <p id="summaryRooms">Chambres: —</p>
                <p id="summaryGuests">Personnes: —</p>
                <p class="fw-bold" id="summaryPrice">Total: 0 dh</p>
              </div>
            </div>
          </div>
        </aside>
      </div>
    </div>
  </main>

  <footer class="py-4 bg-cream border-top">
    <div class="container text-center small text-muted">© <span id="year4"></span> Hôtels Luxe Maroc</div>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="script.js"></script>
</body>
</html>
